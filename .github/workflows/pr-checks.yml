name: PR Checks

on:
  pull_request:
    branches:
      - main
      - preview

jobs:
  enforce-branch-rules:
    name: Enforce Branch Rules
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch for main
        if: github.base_ref == 'main' && github.head_ref != 'preview'
        run: |
          echo "::error::Direct PRs to main are not allowed. All changes must be merged from 'preview'."
          exit 1
      - name: Check source branch for preview
        if: github.base_ref == 'preview' && github.head_ref == 'main'
        run: |
          echo "::error::Cannot merge main into preview via PR."
          exit 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: enforce-branch-rules
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Run build
        run: pnpm run build
