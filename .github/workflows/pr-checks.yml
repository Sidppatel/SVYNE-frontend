name: PR Checks

on:
  pull_request:
    branches:
      - main
      - preview

jobs:
  enforce-branch-rules:
    name: Enforce Branch Rules
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch for main
        if: github.base_ref == 'main' && github.head_ref != 'preview'
        run: |
          echo "::error::Direct PRs to main are not allowed. All changes must be merged from 'preview'."
          exit 1
      - name: Check source branch for preview
        if: github.base_ref == 'preview' && github.head_ref == 'main'
        run: |
          echo "::error::Cannot merge main into preview via PR."
          exit 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: enforce-branch-rules
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.16.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Run build
        run: pnpm run build
